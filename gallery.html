<!DOCTYPE html>
<html lang="en" class="h-screen">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="main.css" />
</head>

<body>
  <header>
    <div
      class="container flex flex-col md:flex-row items-center justify-between max-md:center max-md:justify-center transition">
      <div class="md:flex md:justify-center">
        <strong><img src="/logo.png" alt="logo" class="h-35 w-auto mx-auto md:block md:mx-auto" /></strong>
      </div>

      <nav class="hidden md:block">
        <ul class="flex items-center gap-4">
          <li class="hover:font-bold transform transition-transform duration-300 hover:scale-110">
            <a href="/index.html">Home</a>
          </li>

          <li class="hover:underline transform transition-transform duration-300 hover:scale-110">
            <a href="/about.html">About us</a>
          </li>

          <li class="font-bold hover:underline transform transition-transform duration-300 hover:scale-110">
            <a href="/gallery.html">Gallery</a>
          </li>

          <li class="hover:underline transform transition-transform duration-300 hover:scale-110">
            <a href="contact.html">Contact us</a>
          </li>
        </ul>
      </nav>

      <nav class="md:hidden">
        <ul class="flex items-center gap-4">
          <li class="hover:font-bold transform transition-transform duration-300 hover:scale-110">
            <a href="/index.html">Home</a>
          </li>

          <li class="hover:underline transform transition-transform duration-300 hover:scale-110">
            <a href="/about.html">About us</a>
          </li>

          <li class="font-bold hover:underline transform transition-transform duration-300 hover:scale-110">
            <a href="/gallery.html">Gallery</a>
          </li>

          <li class="hover:underline transform transition-transform duration-300 hover:scale-110">
            <a href="contact.html">Contact us</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <section
    class="w-full max-w-7xl mx-auto p-4 sm:p-8 bg-gray-100 min-h-screen flex flex-col items-center justify-center">

    <h1 class="text-3xl sm:text-4xl font-bold text-center mb-6 sm:mb-10 text-gray-800">Visual Gallery</h1>

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6 w-full">

      <!-- Photo 1 -->
      <div class="overflow-hidden rounded-xl shadow-md transition-transform duration-300 hover:scale-105">
        <img src="https://source.unsplash.com/random/500x500?sig=1" alt="Photo 1"
          class="w-full h-60 sm:h-64 object-cover">
      </div>

      <!-- Photo 2 -->
      <div class="overflow-hidden rounded-xl shadow-md transition-transform duration-300 hover:scale-105">
        <img src="https://source.unsplash.com/random/500x500?sig=2" alt="Photo 2"
          class="w-full h-60 sm:h-64 object-cover">
      </div>

      <!-- Photo 3 -->
      <div class="overflow-hidden rounded-xl shadow-md transition-transform duration-300 hover:scale-105">
        <img src="https://source.unsplash.com/random/500x500?sig=3" alt="Photo 3"
          class="w-full h-60 sm:h-64 object-cover">
      </div>

      <!-- Photo 4 -->
      <div class="overflow-hidden rounded-xl shadow-md transition-transform duration-300 hover:scale-105">
        <img src="https://source.unsplash.com/random/500x500?sig=4" alt="Photo 4"
          class="w-full h-60 sm:h-64 object-cover">
      </div>

      <!-- Photo 5 -->
      <div class="overflow-hidden rounded-xl shadow-md transition-transform duration-300 hover:scale-105">
        <img src="https://source.unsplash.com/random/500x500?sig=5" alt="Photo 5"
          class="w-full h-60 sm:h-64 object-cover">
      </div>

      <!-- Photo 6 -->
      <div class="overflow-hidden rounded-xl shadow-md transition-transform duration-300 hover:scale-105">
        <img src="https://source.unsplash.com/random/500x500?sig=6" alt="Photo 6"
          class="w-full h-60 sm:h-64 object-cover">
      </div>

      <!-- Photo 7 -->
      <div class="overflow-hidden rounded-xl shadow-md transition-transform duration-300 hover:scale-105">
        <img src="https://source.unsplash.com/random/500x500?sig=7" alt="Photo 7"
          class="w-full h-60 sm:h-64 object-cover">
      </div>

      <!-- Photo 8 -->
      <div class="overflow-hidden rounded-xl shadow-md transition-transform duration-300 hover:scale-105">
        <img src="https://source.unsplash.com/random/500x500?sig=8" alt="Photo 8"
          class="w-full h-60 sm:h-64 object-cover">
      </div>

    </div>
  </section>


  <footer class="w-full bg-black text-white py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4">
      <!-- Logo or Name -->
      <div class="text-lg font-semibold">
        © 2025 <span class="text-gray-400">Petite Focus Studio</span>
      </div>

      <!-- Links -->
      <div class="flex space-x-6">
        <a href="#about"
          class="text-gray-300 hover:text-white hover:scale-105 transition-transform duration-300">About</a>
        <a href="#gallery"
          class="text-gray-300 hover:text-white hover:scale-105 transition-transform duration-300">Gallery</a>
        <a href="#contact"
          class="text-gray-300 hover:text-white hover:scale-105 transition-transform duration-300">Contact</a>
      </div>

      <!-- Socials -->
      <div class="flex space-x-4">
        <a href="https://instagram.com" target="_blank"
          class=" hover:text-white hover:scale-105 transition-transform duration-300">Instagram</a>
        <a href="https://facebook.com" target="_blank"
          class=" hover:text-white hover:scale-105 transition-transform duration-300">Facebook</a>
      </div>
    </div>
  </footer>
  <script src="index.js"></script>
</body>

</html>
