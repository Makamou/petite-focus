<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="main.css" />

  <script defer>
    function handleSubmit(event) {
      event.preventDefault();
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const message = document.getElementById("message").value;

      console.log("Contact Form Submitted:");
      console.log("Name:", name);
      console.log("Email:", email);
      console.log("Message:", message);

      alert("Thank you! Your message has been sent.");
    }
  </script>
</head>

<body class="min-h-screen flex flex-col font-[Montserrat]">
  <!-- Header -->
  <header>
    <div
      class="container flex flex-col md:flex-row items-center justify-between max-md:center max-md:justify-center transition">
      <div class="md:flex md:justify-center">
        <strong><img src="/logo.png" alt="logo" class="h-35 w-auto mx-auto md:block md:mx-auto" /></strong>
      </div>

      <nav class="hidden md:block">
        <ul class="flex items-center gap-4">
          <li class="hover:font-bold transform transition-transform duration-300 hover:scale-110">
            <a href="/index.html">Home</a>
          </li>

          <li class="hover:underline transform transition-transform duration-300 hover:scale-110">
            <a href="/about.html">About us</a>
          </li>

          <li class="hover:underline transform transition-transform duration-300 hover:scale-110">
            <a href="/gallery.html">Gallery</a>
          </li>

          <li class="font-bold hover:underline transform transition-transform duration-300 hover:scale-110">
            <a href="contact.html">Contact us</a>
          </li>
        </ul>
      </nav>

      <nav class="md:hidden">
        <ul class="flex items-center gap-4">
          <li class=" hover:font-bold transform transition-transform duration-300 hover:scale-110">
            <a href="/index.html">Home</a>
          </li>

          <li class="hover:underline transform transition-transform duration-300 hover:scale-110">
            <a href="/about.html">About us</a>
          </li>

          <li class="hover:underline transform transition-transform duration-300 hover:scale-110">
            <a href="/gallery.html">Gallery</a>
          </li>

          <li class="font-bold hover:underline transform transition-transform duration-300 hover:scale-110">
            <a href="contact.html">Contact us</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-grow flex items-center justify-center bg-gray-100 p-8 border-t-1">
    <form class="bg-white p-8 max-w-md w-full rounded shadow" onsubmit="handleSubmit(event)">
      <h2 class="text-2xl font-semibold text-center text-gray-800 mb-4">
        Contact
      </h2>
      <p class="text-center text-sm text-gray-600 mb-6">
        Please fill out the form below and I’ll be in touch soon. You can also
        email me at
        <a href="mailto:amkristian91@yahoo.com" class="underline">amkristian91@yahoo.com</a>.
      </p>

      <div class="mb-4">
        <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
        <input type="text" id="name" required
          class="mt-1 w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-black" />
      </div>

      <div class="mb-4">
        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" id="email" required
          class="mt-1 w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-black" />
      </div>

      <div class="mb-4">
        <label for="message" class="block text-sm font-medium text-gray-700">Message</label>
        <textarea id="message" rows="4" required
          class="mt-1 w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-black"></textarea>
      </div>

      <div class="flex justify-center ">
        <button type="submit"
          class="w-fit bg-black text-white py-2 px-4 rounded-md hover:bg-gray-800 transform transition-transform duration-300 hover:scale-110">
          Send Message
        </button>
      </div>
    </form>
  </main>

  <!-- Footer -->
  <footer class="w-full bg-black text-white py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4">
      <!-- Logo or Name -->
      <div class="text-lg font-semibold">
        © 2025 <span class="text-gray-400">Petite Focus Studio</span>
      </div>

      <!-- Links -->
      <div class="flex space-x-6">
        <a href="#about"
          class="text-gray-300 hover:text-white hover:scale-105 transition-transform duration-300">About</a>
        <a href="#gallery"
          class="text-gray-300 hover:text-white hover:scale-105 transition-transform duration-300">Gallery</a>
        <a href="#contact"
          class="text-gray-300 hover:text-white hover:scale-105 transition-transform duration-300">Contact</a>
      </div>

      <!-- Socials -->
      <div class="flex space-x-4">
        <a href="https://instagram.com" target="_blank"
          class=" hover:text-white hover:scale-105 transition-transform duration-300">Instagram</a>
        <a href="https://facebook.com" target="_blank"
          class=" hover:text-white hover:scale-105 transition-transform duration-300">Facebook</a>
      </div>
    </div>
  </footer>
</body>

</html>
